workflow:
  rules:
  - changes:
    - docs/**/*
    - mkdocs.yml
    - requirements-docs.txt
    - .gitlab-ci.yml
  - when: never

image: python:3.12

pages:
  stage: deploy
  before_script:
  - pip install -r requirements-docs.txt
  script:
  - mkdocs build --strict --site-dir public
  artifacts:
    paths: [public]
include:
- project: cta-computing/common/aiv-toolkit
  ref: b71665f7ba90f17f10016f2a10f5dffdb093e64c
  file: ci-functions.yml
