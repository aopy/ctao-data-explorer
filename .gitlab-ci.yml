stages:
  - test
  - build-sonar

pytest:
  stage: test
  tags:
    - sonar
  image: python:3.12
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_NO_CACHE_DIR: "1"
    PYTHONPATH: "$CI_PROJECT_DIR:$CI_PROJECT_DIR/api:$CI_PROJECT_DIR/auth_service"
  before_script:
    - set -euo pipefail
    - python -V
    - python -m venv .venv
    - . .venv/bin/activate

    - python -m pip install -U "pip<26" "setuptools<82" wheel

    - python -c "import setuptools; print('setuptools:', setuptools.__version__)"
    - python -c "import pkg_resources; print('pkg_resources OK')"

    # Install app deps if present (top-level or under api/)
    - if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
    - if [ -f api/requirements.txt ]; then python -m pip install -r api/requirements.txt; fi

    # Install CI/test-only deps
    - if [ -f requirements-ci.txt ]; then python -m pip install -r requirements-ci.txt; fi
    - if [ -f api/requirements-ci.txt ]; then python -m pip install -r api/requirements-ci.txt; fi

    # Re-check after all installs
    - python -c "import pkg_resources; print('pkg_resources still OK after deps')"

    # Create a throwaway .env.ci with safe defaults
    - |
      cat > .env.ci <<EOF
      OPUS_SERVICE=${OPUS_SERVICE:-https://example.invalid/opus}
      OPUS_APP_TOKEN=${OPUS_APP_TOKEN:-dummy-ci-token}
      OPUS_APP_USER=${OPUS_APP_USER:-ci}

      API_DATABASE_URL=sqlite+aiosqlite:///./test.db
      API_REDIS_URL=redis://localhost:6379/0

      AUTH_DATABASE_URL=sqlite+aiosqlite:///./test_auth.db
      AUTH_REDIS_URL=redis://localhost:6379/1

      CTAO_CLIENT_ID=dummy-client-id
      CTAO_CLIENT_SECRET=dummy-client-secret
      OIDC_ISSUER=https://example.invalid/issuer

      BASE_URL=http://localhost:8000
      FRONTEND_BASE_URL=http://localhost:3000
      OIDC_REDIRECT_URI=http://localhost:8001/auth/oidc/callback

      COOKIE_NAME_MAIN_SESSION=ctao_session_main
      COOKIE_SAMESITE=lax
      COOKIE_SECURE=false
      COOKIE_DOMAIN=
      EOF

    # Append a generated encryption key, then make it the active .env
    - |
      python - <<'PY' >> .env.ci
      from cryptography.fernet import Fernet
      print("REFRESH_TOKEN_ENCRYPTION_KEY="+Fernet.generate_key().decode())
      PY
    - cp .env.ci .env

    # Debug
    - which python
    - python -c "import sys; print(sys.executable)"
    - python -m pip --version

  script:
    - . .venv/bin/activate
    - python -m pytest api auth_service/tests --maxfail=1 --disable-warnings --cov=api --cov=auth_service --cov-report=xml:coverage.xml

  artifacts:
    when: always
    paths:
      - coverage.xml
    expire_in: 1 week

  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH

build-sonar:
  stage: build-sonar
  image:
    name: sonarsource/sonar-scanner-cli:11
    entrypoint: [""]
  needs:
    - job: pytest
      artifacts: true
  script:
    - sonar-scanner -Dsonar.host.url="${SONAR_HOST_URL}" -Dsonar.login="${SONAR_TOKEN}"
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH
  allow_failure: true
  tags:
    - sonar