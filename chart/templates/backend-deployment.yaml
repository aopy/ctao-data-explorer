{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ctao-data-explorer.fullname" . }}-backend
  labels:
    {{- include "ctao-data-explorer.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ctao-data-explorer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ctao-data-explorer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ctao-data-explorer.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.global.dockerProxy }}/busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "ctao-data-explorer.postgresql.host" . }} {{ .Values.postgresql.service.port }}; do echo waiting for postgres; sleep 2; done;']
        - name: wait-for-redis
          image: {{ .Values.global.dockerProxy }}/busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "ctao-data-explorer.redis.host" . }} {{ .Values.redis.service.port }}; do echo waiting for redis; sleep 2; done;']
        - name: run-migrations
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          workingDir: /app
          command: ['sh', '-c', 'pixi run alembic upgrade head']
          env:
            - name: DATABASE_URL
              value: {{ include "ctao-data-explorer.databaseUrl" . | quote }}
            - name: REDIS_URL
              value: {{ include "ctao-data-explorer.redisUrl" . | quote }}
            # Alembic (sync driver)
            - name: DB_URL
              value: "postgresql://ao:password@{{ include "ctao-data-explorer.postgresql.host" . }}:5432/fastapi_db"
            # App runtime (async driver)
            - name: DATABASE_URL
              value: "postgresql+asyncpg://ao:password@{{ include "ctao-data-explorer.postgresql.host" . }}:5432/fastapi_db"
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.backend.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      containers:
        - name: backend
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.targetPort }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: {{ include "ctao-data-explorer.databaseUrl" . | quote }}
            - name: REDIS_URL
              value: {{ include "ctao-data-explorer.redisUrl" . | quote }}
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.backend.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
