apiVersion: v1
kind: Service
metadata:
  name: {{ include "ctao-data-explorer.fullname" . }}-auth
spec:
  type: {{ .Values.auth.service.type }}
  ports:
    - port: {{ .Values.auth.service.port }}
      targetPort: {{ .Values.auth.service.targetPort }}
      protocol: TCP
  selector:
    app: {{ include "ctao-data-explorer.name" . }}-auth