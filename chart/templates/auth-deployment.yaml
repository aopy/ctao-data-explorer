apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ctao-data-explorer.fullname" . }}-auth
  labels:
    {{- include "ctao-data-explorer.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
spec:
  replicas: {{ .Values.auth.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "ctao-data-explorer.name" . }}-auth
  template:
    metadata:
      labels:
        app: {{ include "ctao-data-explorer.name" . }}-auth
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      initContainers:
        - name: wait-for-redis
          image: {{ .Values.global.dockerProxy }}/busybox:1.36
          command:
            - sh
            - -c
            - >
              until nc -z {{ include "ctao-data-explorer.redis.host" . }} {{ .Values.redis.service.port }};
              do echo "waiting for redis"; sleep 2; done

      containers:
        - name: auth
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.auth.image.repository }}:{{ .Values.auth.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.auth.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.auth.service.port }}
              name: http

          env:
            - name: REDIS_URL
              value: {{ include "ctao-data-explorer.redisUrl" . | quote }}
            - name: DATABASE_URL
              value: {{ include "ctao-data-explorer.databaseUrl" . | quote }}
            {{- with .Values.auth.env }}
            {{- range $k, $v := . }}
            - name: {{ $k }}
              value: "{{ $v }}"
            {{- end }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.auth.secrets.existingSecret | default (printf "%s-auth-secrets" (include "ctao-data-explorer.fullname" .)) }}

          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5

          resources:
            {{- toYaml .Values.auth.resources | nindent 12 }}