---
apiVersion: v1
kind: Pod
metadata:
  name: "ctao-data-explorer-pytest"
  annotations:
    "helm.sh/hook": test
spec:
  serviceAccountName: {{ .Release.Name }}
  volumes:
  - name: repo
    hostPath:
      path: /repo
  containers:
    - name: kubectl
      # playwright requires ubuntu to run browser tests
      image: "{{ .Values.global.imageRegistry }}/{{ .Values.dev.test_pod.image.repository }}:{{ .Values.dev.test_pod.image.tag | default .Chart.AppVersion }}"
      imagePullPolicy: IfNotPresent
      workingDir: /repo
      command:
        - /bin/sh
        - -c
        - |
          export FRONTEND_URL=http://{{ .Release.Name }}-frontend.{{ .Release.Namespace }}.svc.cluster.local:3000

          curl -v $FRONTEND_URL

          . /opt/venv/bin/activate

          {{ if .Values.dev.run_tests }}
          pytest tests/test_playwrite.py \
            -v --maxfail=1 --disable-warnings -o log_cli=true --log-cli-level=INFO \
            --cov \
            --cov-report=xml:/tmp/coverage.xml \
            --junitxml=/tmp/report.xml \
            --color=yes \
            --browser=firefox --base-url=$FRONTEND_URL 

          curl -T /tmp/coverage.xml http://testkit:8000/coverage.xml
          curl -T /tmp/report.xml http://testkit:8000/report.xml
          curl -T /tmp/test_frontend.png http://testkit:8000/test_frontend.png
          {{ end }}

          {{ if .Values.dev.sleep }}
          sleep infinity
          {{ end }}


      volumeMounts:
        - name: repo
          mountPath: /repo
          readOnly: false

  restartPolicy: Never
