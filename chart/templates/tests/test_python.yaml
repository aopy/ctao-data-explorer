---
apiVersion: v1
kind: Pod
metadata:
  name: "ctao-data-explorer-pytest"
  annotations:
    "helm.sh/hook": test
spec:
  volumes:
  - name: repo
    hostPath:
      path: /repo
  automountServiceAccountToken: false      
  containers:
    - name: pytest
      # playwright requires ubuntu to run browser tests
      image: "{{ .Values.global.imageRegistry }}/{{ .Values.dev.test_pod.image.repository }}:{{ .Values.dev.test_pod.image.tag | default .Chart.AppVersion }}"
      imagePullPolicy: IfNotPresent
      workingDir: /repo
      command:
        - /bin/bash
        - -c
        - |
          export FRONTEND_URL=http://{{ include "ctao-data-explorer.fullname" . }}-frontend
          
          echo "Frontend URL: $FRONTEND_URL"

          echo "Waiting for frontend..."
          until curl -sf "$FRONTEND_URL" >/dev/null; do
            sleep 2
          done

          . /opt/venv/bin/activate

          {{ if .Values.dev.run_tests }}
          pytest tests/test_playwrite.py \
            -v --maxfail=1 --disable-warnings -o log_cli=true --log-cli-level=INFO \
            --cov \
            --cov-report=xml:/tmp/coverage.xml \
            --junitxml=/tmp/report.xml \
            --color=yes \
            --browser=firefox
            --base-url=$FRONTEND_URL 

          curl -T /tmp/coverage.xml http://testkit:8000/coverage.xml
          curl -T /tmp/report.xml http://testkit:8000/report.xml
          {{ end }}

          {{ if .Values.dev.sleep }}
          sleep infinity
          {{ end }}


      volumeMounts:
        - name: repo
          mountPath: /repo
          readOnly: false

      resources:
      {{- toYaml .Values.dev.test_pod.resources | nindent 8 }}
      

  restartPolicy: Never
